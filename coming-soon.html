<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jahecha — Algo se viene.</title>
  <meta name="description" content="Jahecha. Presencia digital para negocios paraguayos. Próximamente.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy-dark: #051121;
      --navy: #0A2140;
      --orange: #FF7A00;
      --teal: #1A7A6A;
      --white: #FAFAF8;
      --muted: rgba(250, 250, 248, 0.55);
      --muted-2: rgba(250, 250, 248, 0.28);
      --border: rgba(255, 255, 255, 0.08);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font);
      background: var(--navy-dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Grid texture */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* Glows */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
    }

    .glow-orange {
      width: 560px;
      height: 560px;
      background: rgba(255, 122, 0, 0.10);
      top: -160px;
      right: -80px;
      animation: drift 9s ease-in-out infinite alternate;
    }

    .glow-teal {
      width: 420px;
      height: 420px;
      background: rgba(26, 122, 106, 0.08);
      bottom: -120px;
      left: -60px;
      animation: drift 11s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(30px, 24px);
      }
    }

    /* Noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 20;
    }

    /* ── NAVBAR minimal ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
    }

    .symbol {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 20px;
      height: 20px;
    }

    .sq {
      background: var(--orange);
      border-radius: 2px;
      transform: scale(0);
      animation: pop 0.5s var(--ease) forwards;
    }

    .sq:nth-child(1) {
      opacity: 1;
      animation-delay: 0.10s;
    }

    .sq:nth-child(2) {
      opacity: 0.65;
      animation-delay: 0.20s;
    }

    .sq:nth-child(3) {
      opacity: 0.35;
      animation-delay: 0.30s;
    }

    .sq:nth-child(4) {
      opacity: 0.18;
      animation-delay: 0.40s;
    }

    @keyframes pop {
      to {
        transform: scale(1);
      }
    }

    /* ── MAIN content ── */
    .wrapper {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 40px 24px;
      max-width: 640px;
      width: 100%;
    }

    /* Big symbol */
    .big-symbol {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 56px;
      height: 56px;
      margin: 0 auto 40px;
    }

    .big-symbol .sq {
      border-radius: 5px;
      animation-delay: calc(var(--i) * 0.12s + 0.1s);
    }

    .big-symbol .sq:nth-child(1) {
      --i: 0;
      opacity: 1;
    }

    .big-symbol .sq:nth-child(2) {
      --i: 1;
      opacity: 0.65;
    }

    .big-symbol .sq:nth-child(3) {
      --i: 2;
      opacity: 0.35;
    }

    .big-symbol .sq:nth-child(4) {
      --i: 3;
      opacity: 0.18;
    }

    /* eyebrow */
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s var(--ease) forwards;
    }

    /* headline */
    h1 {
      font-family: var(--font);
      font-size: clamp(48px, 9vw, 80px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: var(--white);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.7s 0.70s var(--ease) forwards;
    }

    /* sub */
    .sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.85s var(--ease) forwards;
    }

    /* progress */
    .progress-wrap {
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 0.7s 1.0s var(--ease) forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--orange), var(--teal));
      border-radius: 2px;
      animation: fill 1.8s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fill {
      to {
        width: 72%;
      }
    }



    /* Side text */
    .side-text {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.14);
      z-index: 5;
      white-space: nowrap;
    }

    /* Footer note */
    .footer-note {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 1px;
      z-index: 5;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .side-text {
        display: none;
      }

      .navbar {
        padding: 24px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="grid-bg"></div>
  <div class="glow glow-orange"></div>
  <div class="glow glow-teal"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="#" class="nav-logo">
      Jahecha
    </a>
  </nav>

  <div class="side-text">Asunción · Paraguay · 2025</div>

  <!-- Main -->
  <div class="wrapper">



    <p class="eyebrow">Próximamente</p>
    <h1>Algo se viene.</h1>
    <p class="sub">Estamos construyendo la presencia digital que tu negocio merece. Jahecha llega pronto.</p>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>En construcción</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>



  </div>

  <p class="footer-note">© 2026 Jahecha · jahecha.com.py</p>

</body>

</html>
